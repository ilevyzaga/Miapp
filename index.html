<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MatchIQ MX</title>

    <link rel="stylesheet" href="style.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="/images/ligamx.png" alt="Liga MX">

            <div>
                <h1>MatchIQ MX</h1>
                <p>Resultados y predicciones inteligentes</p>
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <main id="contenido"></main>

    <!-- Navegación inferior -->
    <nav>
        <button onclick="mostrarSeccion('inicio')">
            <i data-lucide="home"></i>
            Inicio
        </button>

        <button onclick="mostrarSeccion('estadisticas')">
            <i data-lucide="bar-chart-3"></i>
            Stats
        </button>

        <button onclick="mostrarSeccion('predicciones')">
            <i data-lucide="sparkles"></i>
            IA
        </button>

        <button onclick="mostrarSeccion('perfil')">
            <i data-lucide="user"></i>
            Perfil
        </button>
    </nav>

    <!-- Script principal -->
    <script src="script.js"></script>

    <script>
        cargarInicio();
        lucide.createIcons();
    </script>

</body>
</html>
